name: Build TWA SaLaTi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Generate keystore
      run: |
        keytool -genkeypair \
          -alias salati-key \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -keystore salati.keystore \
          -storepass salati2026 \
          -keypass salati2026 \
          -dname "CN=SaLaTi Admin, OU=Engineering, O=SaLaTi Prayer Times, L=Casablanca, ST=MA, C=MA" \
          -noprompt

    - name: Get fingerprint
      run: |
        echo "=== SHA256 FINGERPRINT ==="
        keytool -list -v \
          -keystore salati.keystore \
          -alias salati-key \
          -storepass salati2026 \
          -noprompt | grep SHA256

    - name: Create Bubblewrap config
      run: |
        cat > twa-manifest.json << 'TWAEOF'
        {
          "packageId": "io.github.webnour2026.twa",
          "host": "webnour2026.github.io",
          "name": "SaLaTi — Prayer Times & Qibla",
          "launcherName": "SaLaTi",
          "display": "standalone",
          "orientation": "portrait",
          "themeColor": "#0b0f0e",
          "navigationColor": "#0b0f0e",
          "navigationColorDark": "#0b0f0e",
          "navigationDividerColor": "#0b0f0e",
          "navigationDividerColorDark": "#0b0f0e",
          "backgroundColor": "#0b0f0e",
          "enableNotifications": true,
          "startUrl": "/SaLaTi/",
          "iconUrl": "https://webnour2026.github.io/SaLaTi/icon-512.png",
          "maskableIconUrl": "https://webnour2026.github.io/SaLaTi/icon-512-maskable.png",
          "monochromeIconUrl": "https://webnour2026.github.io/SaLaTi/icon-512.png",
          "splashScreenFadeOutDuration": 300,
          "signingKey": {
            "path": "../salati.keystore",
            "alias": "salati-key"
          },
          "appVersionCode": 1,
          "appVersion": "1.0.0",
          "shortcuts": [],
          "generatorApp": "bubblewrap-cli",
          "webManifestUrl": "https://webnour2026.github.io/SaLaTi/manifest.json",
          "fallbackType": "customtabs",
          "features": {
            "locationDelegation": {"enabled": true},
            "playBilling": {"enabled": false}
          },
          "alphaDependencies": {"enabled": false},
          "enableSiteSettingsShortcut": true,
          "isChromeOSOnly": false,
          "isMetaQuest": false,
          "minSdkVersion": 21,
          "targetSdkVersion": 34,
          "additionalTrustedOrigins": [],
          "retainedBundles": []
        }
        TWAEOF

    - name: Init Bubblewrap project
      run: |
        mkdir twa-project && cd twa-project
        bubblewrap init \
          --manifest https://webnour2026.github.io/SaLaTi/manifest.json \
          --directory .
      env:
        BUBBLEWRAP_DISABLE_TELEMETRY: true

    - name: Build APK and AAB
      run: |
        cd twa-project
        echo "salati2026" | bubblewrap build \
          --skipPwaValidation

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SaLaTi-TWA-Release
        path: |
          twa-project/app-release-signed.apk
          twa-project/app-release.aab
          salati.keystore
        retention-days: 30
