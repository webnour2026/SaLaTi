name: Build TWA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: android-actions/setup-android@v3
    - run: npm install -g @bubblewrap/cli
    - run: |
        bubblewrap init \
          --manifest https://webnour2026.github.io/SaLaTi/manifest.json \
          --packageId io.github.webnour2026.twa
        bubblewrap build
      env:
        BUBBLEWRAP_SKIP_PROMPTS: true
    - uses: actions/upload-artifact@v4
      with:
        name: SaLaTi-TWA
        path: |
          app-release-signed.apk
          app-release.aab
