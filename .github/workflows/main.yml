name: Build TWA SaLaTi
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    - uses: android-actions/setup-android@v3
    - name: SDK
      run: yes | sdkmanager "build-tools;34.0.0" "platforms;android-34" --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true
    - name: Keystore
      run: keytool -genkeypair -alias salati-key -keyalg RSA -keysize 2048 -validity 10000 -keystore $GITHUB_WORKSPACE/salati.keystore -storepass salati2026 -keypass salati2026 -dname "CN=SaLaTi,OU=Dev,O=SaLaTi,L=Casablanca,ST=MA,C=MA" -noprompt && keytool -list -v -keystore $GITHUB_WORKSPACE/salati.keystore -storepass salati2026 -noprompt | grep SHA256
    - name: Icon
      run: mkdir -p twa/app/src/main/res/mipmap-xxxhdpi twa/app/src/main/res/mipmap-xxhdpi twa/app/src/main/res/mipmap-xhdpi twa/app/src/main/res/mipmap-hdpi twa/app/src/main/res/mipmap-mdpi && curl -sL "https://webnour2026.github.io/SaLaTi/icon-512.png" -o twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png && for d in mipmap-xxhdpi mipmap-xhdpi mipmap-hdpi mipmap-mdpi; do cp twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png twa/app/src/main/res/$d/; done
    - name: Gradle wrapper
      run: cd twa && gradle wrapper --gradle-version=8.2 --distribution-type=bin && chmod +x gradlew
    - name: Build
      run: cd twa && ./gradlew :app:assembleRelease --no-daemon 2>&1 | tail -80
    - name: Find APK
      run: find twa -name "*.apk" 2>/dev/null && echo "---" && ls -la twa/app/build/outputs/apk/release/ 2>/dev/null || echo "not found"
    - uses: actions/upload-artifact@v4
      with:
        name: SaLaTi-TWA
        path: |
          twa/app/build/outputs/apk/release/*.apk
          salati.keystore
        retention-days: 30
