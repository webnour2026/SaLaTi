name: Build TWA SaLaTi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install SDK components
      run: |
        yes | sdkmanager "build-tools;34.0.0" "platforms;android-34" \
          --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true

    - name: Generate keystore
      run: |
        keytool -genkeypair \
          -alias salati-key \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -keystore $GITHUB_WORKSPACE/salati.keystore \
          -storepass salati2026 -keypass salati2026 \
          -dname "CN=SaLaTi,OU=Dev,O=SaLaTi,L=Casablanca,ST=MA,C=MA" \
          -noprompt
        keytool -list -v \
          -keystore $GITHUB_WORKSPACE/salati.keystore \
          -storepass salati2026 -noprompt | grep SHA256

    - name: Create TWA project
      run: |
        mkdir -p twa/app/src/main/res/values
        mkdir -p twa/app/src/main/res/xml
        mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
        curl -sL "https://webnour2026.github.io/SaLaTi/icon-512.png" \
          -o twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

        cat > twa/settings.gradle << 'EOF'
pluginManagement {
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories { google(); mavenCentral() }
}
rootProject.name = "SaLaTi"
include ':app'
EOF

        cat > twa/build.gradle << 'EOF'
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
}
EOF

        cat > twa/gradle.properties << 'EOF'
android.useAndroidX=true
android.enableJetifier=true
EOF

        cat > twa/app/build.gradle << 'EOF'
apply plugin: 'com.android.application'
android {
    namespace 'io.github.webnour2026.twa'
    compileSdkVersion 34
    defaultConfig {
        applicationId 'io.github.webnour2026.twa'
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName '1.0.0'
    }
    signingConfigs {
        release {
            storeFile file(System.getenv("GITHUB_WORKSPACE") + "/salati.keystore")
            storePassword 'salati2026'
            keyAlias 'salati-key'
            keyPassword 'salati2026'
        }
    }
    buildTypes {
        release { minifyEnabled false; signingConfig signingConfigs.release }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
EOF

        cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET"/>
    <application
        android:label="SaLaTi"
        android:icon="@mipmap/ic_launcher"
        android:allowBackup="true"
        android:theme="@android:style/Theme.Black.NoTitleBar">
        <activity
            android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
            android:exported="true"
            android:screenOrientation="portrait">
            <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                android:value="https://webnour2026.github.io/SaLaTi/"/>
            <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                android:resource="@color/colorPrimary"/>
            <meta-data android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                android:resource="@color/colorPrimary"/>
            <meta-data android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                android:resource="@color/colorPrimary"/>
            <meta-data android:name="android.support.customtabs.trusted.SPLASH_SCREEN_FADE_OUT_DURATION"
                android:value="300"/>
            <meta-data android:name="android.support.customtabs.trusted.FILE_PROVIDER_AUTHORITY"
                android:value="io.github.webnour2026.twa.fileprovider"/>
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
            <intent-filter android:autoVerify="true">
                <action android:name="android.intent.action.VIEW"/>
                <category android:name="android.intent.category.DEFAULT"/>
                <category android:name="android.intent.category.BROWSABLE"/>
                <data android:scheme="https"
                    android:host="webnour2026.github.io"
                    android:pathPrefix="/SaLaTi"/>
            </intent-filter>
        </activity>
        <provider
            android:name="androidx.core.content.FileProvider"
            android:authorities="io.github.webnour2026.twa.fileprovider"
            android:exported="false"
            android:grantUriPermissions="true">
            <meta-data android:name="android.support.FILE_PROVIDER_PATHS"
                android:resource="@xml/provider_paths"/>
        </provider>
    </application>
</manifest>
EOF

        cat > twa/app/src/main/res/values/colors.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="colorPrimary">#0b0f0e</color>
</resources>
EOF

        cat > twa/app/src/main/res/xml/provider_paths.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<paths>
    <external-path name="external_files" path="."/>
</paths>
EOF

    - name: Setup Gradle wrapper
      run: |
        cd twa
        gradle wrapper --gradle-version=8.2 --distribution-type=bin
        chmod +x gradlew

    - name: Build APK
      run: |
        cd twa
        ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -80

    - name: Find APK
      run: |
        find /home/runner/work -name "*.apk" 2>/dev/null
        ls -la twa/app/build/outputs/apk/release/ 2>/dev/null || echo "not found"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: SaLaTi-TWA
        path: |
          twa/app/build/outputs/apk/release/app-release.apk
          salati.keystore
        retention-days: 30
```
