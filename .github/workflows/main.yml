name: Build TWA SaLaTi
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    - uses: android-actions/setup-android@v3
    - name: SDK
      run: yes | sdkmanager "build-tools;34.0.0" "platforms;android-34" --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true
    - name: Keystore
      run: keytool -genkeypair -alias salati-key -keyalg RSA -keysize 2048 -validity 10000 -keystore $GITHUB_WORKSPACE/salati.keystore -storepass salati2026 -keypass salati2026 -dname "CN=SaLaTi,OU=Dev,O=SaLaTi,L=Casablanca,ST=MA,C=MA" -noprompt && keytool -list -v -keystore $GITHUB_WORKSPACE/salati.keystore -storepass salati2026 -noprompt | grep SHA256
    - name: Create project if missing
      run: |
        if [ ! -f twa/app/build.gradle ]; then
          mkdir -p twa/app/src/main/res/values twa/app/src/main/res/xml twa/app/src/main/res/mipmap-xxxhdpi twa/app/src/main/res/mipmap-xxhdpi twa/app/src/main/res/mipmap-xhdpi twa/app/src/main/res/mipmap-hdpi twa/app/src/main/res/mipmap-mdpi
          printf 'pluginManagement {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\nrootProject.name = "SaLaTi"\ninclude ":app"\n' > twa/settings.gradle
          printf "buildscript {\n    repositories {\n        google()\n        mavenCentral()\n    }\n    dependencies {\n        classpath 'com.android.tools.build:gradle:8.2.2'\n    }\n}\n" > twa/build.gradle
          printf "android.useAndroidX=true\nandroid.enableJetifier=true\n" > twa/gradle.properties
          printf "apply plugin: 'com.android.application'\nandroid {\n    namespace 'io.github.webnour2026.twa'\n    compileSdkVersion 34\n    defaultConfig {\n        applicationId 'io.github.webnour2026.twa'\n        minSdkVersion 21\n        targetSdkVersion 34\n        versionCode 1\n        versionName '1.0.0'\n    }\n    signingConfigs {\n        release {\n            storeFile file(System.getenv(\"GITHUB_WORKSPACE\") + \"/salati.keystore\")\n            storePassword 'salati2026'\n            keyAlias 'salati-key'\n            keyPassword 'salati2026'\n        }\n    }\n    buildTypes {\n        release { minifyEnabled false; signingConfig signingConfigs.release }\n    }\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }\n}\ndependencies {\n    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'\n}\n" > twa/app/build.gradle
          printf '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <application android:label="SaLaTi" android:icon="@mipmap/ic_launcher" android:allowBackup="true" android:theme="@android:style/Theme.Black.NoTitleBar">\n        <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity" android:exported="true" android:screenOrientation="portrait">\n            <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="https://webnour2026.github.io/SaLaTi/"/>\n            <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR" android:resource="@color/colorPrimary"/>\n            <meta-data android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR" android:resource="@color/colorPrimary"/>\n            <meta-data android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR" android:resource="@color/colorPrimary"/>\n            <meta-data android:name="android.support.customtabs.trusted.SPLASH_SCREEN_FADE_OUT_DURATION" android:value="300"/>\n            <meta-data android:name="android.support.customtabs.trusted.FILE_PROVIDER_AUTHORITY" android:value="io.github.webnour2026.twa.fileprovider"/>\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN"/>\n                <category android:name="android.intent.category.LAUNCHER"/>\n            </intent-filter>\n            <intent-filter android:autoVerify="true">\n                <action android:name="android.intent.action.VIEW"/>\n                <category android:name="android.intent.category.DEFAULT"/>\n                <category android:name="android.intent.category.BROWSABLE"/>\n                <data android:scheme="https" android:host="webnour2026.github.io" android:pathPrefix="/SaLaTi"/>\n            </intent-filter>\n        </activity>\n        <provider android:name="androidx.core.content.FileProvider" android:authorities="io.github.webnour2026.twa.fileprovider" android:exported="false" android:grantUriPermissions="true">\n            <meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/provider_paths"/>\n        </provider>\n    </application>\n</manifest>\n' > twa/app/src/main/AndroidManifest.xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources><color name="colorPrimary">#0b0f0e</color></resources>\n' > twa/app/src/main/res/values/colors.xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<paths><external-path name="external_files" path="."/></paths>\n' > twa/app/src/main/res/xml/provider_paths.xml
        fi
    - name: Icon
      run: curl -sL "https://webnour2026.github.io/SaLaTi/icon-512.png" -o twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png && for d in mipmap-xxhdpi mipmap-xhdpi mipmap-hdpi mipmap-mdpi; do mkdir -p twa/app/src/main/res/$d && cp twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png twa/app/src/main/res/$d/; done
    - name: Gradle wrapper
      run: cd twa && gradle wrapper --gradle-version=8.2 --distribution-type=bin && chmod +x gradlew
    - name: Build
      run: cd twa && ./gradlew :app:assembleRelease --no-daemon 2>&1 | tail -60
    - name: Copy APK
      run: |
        mkdir -p /tmp/apk-output
        cp twa/app/build/outputs/apk/release/app-release.apk /tmp/apk-output/SaLaTi.apk
        cp $GITHUB_WORKSPACE/salati.keystore /tmp/apk-output/salati.keystore
        ls -la /tmp/apk-output/
    - uses: actions/upload-artifact@v4
      with:
        name: SaLaTi-TWA
        path: /tmp/apk-output/
        retention-days: 30
